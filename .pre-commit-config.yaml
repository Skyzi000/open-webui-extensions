repos:
  - repo: local
    hooks:
      - id: lint-tools-class
        name: Check Tools class API compatibility
        entry: python scripts/lint_tools_class.py
        language: python
        files: \.py$
        pass_filenames: true
      - id: release-builder-check
        name: Verify single-file release outputs are up-to-date and version-bumped
        # --no-sync stops uv from re-resolving the dev group (which pulls in
        # open-webui's editable install + frontend build) on every commit. The
        # hook needs the builder pre-installed in the active venv -- run
        # `uv sync` or `uv pip install -e ./open_webui_plugins_builder` once.
        entry: uv run --no-sync python scripts/build_release.py --changed --check --staged
        language: system
        pass_filenames: false
        files: ^(src/owui_ext/|tools/|functions/filter/|release\.toml|open_webui_plugins_builder/|scripts/build_release\.py).*$
